apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectcamp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connectcamp-backend
  template:
    metadata:
      labels:
        app: connectcamp-backend
    spec:
      containers:
      - name: connectcamp-backend
        image: yazidebouthouri/connectcamp-backend:latest
        ports:
        - containerPort: 8089